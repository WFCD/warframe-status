exit: true
spec: src/test/**/*-integration.spec.ts
node-option:
  - import=tsx
enableSourceMaps: true
enable-source-maps: true
checkLeaks: true
timeout: 600000  # 10 minutes for integration tests (may need external API calls)
normal: 5000
slow: 10000
fullTrace: true
bail: false
parallel: false
require:
  - src/test/env-setup.ts
  - src/test/hooks/setup.hook.ts
