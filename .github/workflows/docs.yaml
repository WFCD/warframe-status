name: API docs

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to deploy
        required: false
        default: main
        type: string

concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-docs.yml
    with:
      ref: ${{ inputs.ref }}
    secrets: inherit
