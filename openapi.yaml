  /wfinfo/filtered_items:
    get:
      description: Retrieve filtered item data used by the WFInfo overlay application. The data structure depends on the external source configured via the WFINFO_FILTERED_ITEMS environment variable. Returns 503 if the service is not configured or unavailable.
      operationId: WFInfoController_getFilteredItems
      parameters: []
      responses:
        '200':
          description: Filtered items data including relics (organized by era), equipment (with parts and ducat values), and ignored items (market data)
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
                    example: []
                  timestamp:
                    type: string
                    example: '2024-01-15T12:00:00.000Z'
                  relics:
                    type: object
                    example:
                      Axi:
                        A1:
                          vaulted: false
                          rare1: Aklex Prime Link
                          uncommon1: Lex Prime Barrel
                  eqmt:
                    type: object
                    example:
                      Braton Prime:
                        type: Primary
                        vaulted: true
                        parts:
                          Blueprint:
                            count: 1
                            ducats: 0
                            vaulted: true
                  ignored_items:
                    type: object
                    example:
                      Peculiar Bloom:
                        plat: 10
                        ducats: 0
                        volume: 50
        '503':
          description: WFInfo data service is not configured or unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WFInfoUnavailableDto'
      summary: Get WFInfo filtered items data
      tags:
        - wfinfo
