  /mods/search/{query}:
    get:
      description: Search for items using one or more comma-separated search terms. Returns all matching results.
      operationId: ItemsController_search[3]
      parameters:
        - name: Accept-Language
          in: header
          description: Preferred language for the response
          required: false
          schema:
            type: string
            example: en
        - name: language
          required: false
          in: query
          description: Language code for localized data. Overrides Accept-Language header
          schema:
            example: en
            type: string
        - name: filter
          required: false
          in: query
          description: Comma-separated list of key:value filters to apply (e.g., "tradable:true")
          schema:
            example: tradable:true
            type: string
        - name: only
          required: false
          in: query
          description: Comma-separated list of fields to include in the response
          schema:
            example: name,uniqueName,type
            type: string
        - name: remove
          required: false
          in: query
          description: Comma-separated list of fields to exclude from the response
          schema:
            example: patchlogs,components
            type: string
        - name: by
          required: false
          in: query
          description: Field to search by (e.g., "name", "uniqueName", "regex"). Defaults to "name"
          schema:
            example: name
            type: string
        - name: query
          required: true
          in: path
          description: Comma-separated search terms to find items. Each term is searched independently and results are combined
          schema:
            example: Excalibur,Mag
            type: string
      responses:
        '200':
          description: Array of items matching the search query
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    uniqueName:
                      type: string
                      example: /Lotus/Powersuits/Excalibur/Excalibur
                    name:
                      type: string
                      example: Excalibur
                    type:
                      type: string
                      example: Warframe
                    category:
                      type: string
                      example: Warframes
                    tradable:
                      type: boolean
                      example: false
                    masterable:
                      type: boolean
                      example: true
      summary: Search for items by query string
      tags:
        - items
