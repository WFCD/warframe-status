  /pricecheck/{type}/{query}:
    get:
      description: 'Query warframe.market for item prices. Supports three response types: "string" (formatted text), "find" (raw data), and "attachment" (Discord embed format). Optional query params filter mod rank and other order modifiers. Requires PRICECHECKS_ENABLED=true.'
      operationId: PriceCheckController_priceCheck
      parameters:
        - name: rankLt
          required: false
          in: query
          description: Filter mod orders to ranks less than this value
          schema:
            example: 5
            type: number
        - name: ranks
          required: false
          in: query
          description: Compare multiple mod ranks in one response (comma-separated, e.g. 0,5,10)
          schema:
            example: 0,10
            type: string
        - name: rank
          required: false
          in: query
          description: Filter mod orders to a specific rank (0-10)
          schema:
            example: 10
            type: number
        - name: platform
          in: header
          description: Platform to query (pc, ps4, xb1, swi, ns). Defaults to pc if not provided.
          required: false
          schema:
            type: string
            example: pc
        - name: query
          required: true
          in: path
          description: Item name or search query
          schema:
            example: Excalibur Prime
            type: string
        - name: type
          required: true
          in: path
          description: 'Response format type: "string" for formatted text, "find" for raw SummaryV2 data, "attachment" for Discord embed format'
          schema:
            enum:
              - string
              - find
              - attachment
            type: string
      responses:
        '200':
          description: 'Price check results. Format depends on type parameter: string returns formatted text, find returns SummaryV2[], attachment returns DiscordEmbed[]'
          content:
            application/json:
              schema:
                oneOf:
                  - type: string
                    description: Formatted price text (type=string)
                  - type: array
                    description: Array of price summaries (type=find)
                    items:
                      type: object
                  - type: array
                    description: Array of Discord embeds (type=attachment)
                    items:
                      type: object
        '404':
          description: Item not found or invalid type parameter
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PriceCheckNotFoundDto'
                  - $ref: '#/components/schemas/PriceCheckInvalidTypeDto'
        '500':
          description: Internal server error during price check
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceCheckErrorDto'
        '503':
          description: Price check service is disabled or unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceCheckUnavailableDto'
      summary: Price check items on warframe.market
      tags:
        - pricecheck
