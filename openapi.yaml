  /synthTargets:
    get:
      description: Retrieve list of Sanctuary Synthesis targets for the Synthesis Scanner system. Supports localization.
      operationId: DataController_getSynthTargets
      parameters:
        - name: Accept-Language
          in: header
          description: Preferred language for the response. Overridden by language query parameter if provided.
          required: false
          schema:
            type: string
            example: en
        - name: language
          required: false
          in: query
          description: 'Language code for localized data (2 characters). Supported: en, de, es, fr, it, ko, pl, pt, ru, zh, cs, sr, uk'
          schema:
            example: en
            type: string
      responses:
        '200':
          description: Array of synthesis target data with locations
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      example: Ancient Disruptor
                    imageKey:
                      type: string
                      example: ancient_disruptor
                    locations:
                      type: array
                      items:
                        type: object
                        properties:
                          last_verified:
                            type: string
                            example: '2019-02-24'
                          level:
                            type: string
                            example: 6-16
                          faction:
                            type: string
                            example: Infested
                          spawn_rate:
                            type: string
                            example: 100%
                          mission:
                            type: string
                            example: Tikal
                          planet:
                            type: string
                            example: Earth
                          type:
                            type: string
                            example: Excavation
        '404':
          description: Unknown data keys and platforms return this response shape
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDetailedNotFoundDto'
      summary: Get Sanctuary Synthesis targets
      tags:
        - data
