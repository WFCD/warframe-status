  /{key}:
    get:
      description: 'Retrieve static Warframe data for any available key. For common endpoints, use the specific routes instead (e.g., /synthTargets, /arcanes). This generic endpoint supports all data keys including: events, operationTypes, persistentEnemy, sortie, upgradeTypes, fissureModifiers, archonShards, and language-specific data (en, de, es, fr, it, ko, pl, pt, ru, zh, cs, sr, uk). Supports localization.'
      operationId: DataController_getDataGeneric
      parameters:
        - name: Accept-Language
          in: header
          description: Preferred language for the response. Overridden by language query parameter if provided.
          required: false
          schema:
            type: string
            example: en
        - name: language
          required: false
          in: query
          description: 'Language code for localized data (2 characters). Supported: en, de, es, fr, it, ko, pl, pt, ru, zh, cs, sr, uk'
          schema:
            example: en
            type: string
        - name: key
          required: true
          in: path
          description: Data key to retrieve. Use specific endpoints for common keys, or this generic endpoint for less common keys like events, operationTypes, persistentEnemy, sortie, upgradeTypes, etc.
          schema:
            example: events
            type: string
      responses:
        '200':
          description: Static data for the requested key. Structure varies by key type.
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    description: Array of data items
                  - type: object
                    description: Object containing data
        '404':
          description: Data key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataNotFoundDto'
      summary: Get static Warframe data by key (generic)
      tags:
        - data
  /{key}/search/{query}:
    get:
      description: Search for specific entries within a data key using comma-separated query terms. Each term is searched independently and results are combined.
      operationId: DataController_searchData
      parameters:
        - name: Accept-Language
          in: header
          description: Preferred language for the response
          required: false
          schema:
            type: string
            example: en
        - name: language
          required: false
          in: query
          description: Language code for localized data (2 characters)
          schema:
            example: en
            type: string
        - name: query
          required: true
          in: path
          description: Comma-separated search terms to find matching entries (case-insensitive)
          schema:
            example: Synthesis Scanner
            type: string
        - name: key
          required: true
          in: path
          description: Data key to search within (e.g., synthTargets, arcanes, solNodes)
          schema:
            example: synthTargets
            type: string
      responses:
        '200':
          description: Array of matching data entries
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '404':
          description: Unknown data keys and platforms return this response shape
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDetailedNotFoundDto'
        '500':
          description: Search failed or internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataErrorDto'
      summary: Search static Warframe data
      tags:
        - data
components:
  schemas:
    HeartbeatResponseDto:
      type: object
      properties:
        message:
          type: string
          description: Status message indicating the service is operational
          example: Success
        code:
          type: number
          description: HTTP status code
          example: 200
      required:
        - message
        - code
    ItemNotFoundDto:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: No Result
        code:
          type: number
          description: HTTP status code
          example: 404
      required:
        - error
        - code
    ApiMessageNotFoundDto:
      type: object
      properties:
        statusCode:
          type: number
          description: HTTP status code
          example: 404
        message:
          type: string
          description: Error message
          example: WorldState not found
      required:
        - statusCode
        - message
    DropDto:
      type: object
      properties:
        place:
          type: string
          description: Location or mission where the item drops
          example: Lua/Apollo (Survival)
        item:
          type: string
          description: Name of the item that drops
          example: Rotation C
        rarity:
          type: string
          description: Rarity tier of the drop
          enum:
            - common
            - uncommon
            - rare
            - legendary
          example: rare
        chance:
          type: number
          description: Drop chance as a decimal percentage (0-100)
          example: 11.28
        rotation:
          type: string
          description: Rotation identifier for endless missions
          enum:
            - A
            - B
            - C
            - D
            - E
            - F
            - G
          example: C
      required:
        - place
        - item
    DropRewardDto:
      type: object
      properties:
        item:
          type: string
          description: Name of the item that drops
          example: Axi A14 Relic
        rarity:
          type: string
          description: Rarity tier of the drop
          enum:
            - common
            - uncommon
            - rare
            - legendary
          example: rare
        chance:
          type: number
          description: Drop chance as a decimal percentage (0-100)
          example: 11.28
        rotation:
          type: string
          description: Rotation identifier for endless missions
          enum:
            - A
            - B
            - C
            - D
            - E
            - F
            - G
          example: C
      required:
        - item
    LocationGroupDto:
      type: object
      properties:
        rewards:
          description: Array of drops available at this location
          type: array
          items:
            $ref: '#/components/schemas/DropRewardDto'
      required:
        - rewards
    ApiInternalErrorDto:
      type: object
      properties:
        statusCode:
          type: number
          description: HTTP status code
          example: 500
        message:
          type: string
          description: Error message
          example: Failed to load drops data
      required:
        - statusCode
        - message
    RivenStatDto:
      type: object
      properties:
        itemType:
          type: string
