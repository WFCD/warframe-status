openapi: 3.0.0
info:
  title: Warframe Status API
  description: API for retrieving Warframe worldstate data, items, profiles, and more
  version: 3.2.4
  contact:
    name: Warframe Community Developers
    url: https://github.com/WFCD/warframe-status
    email: tobiah@warframestat.us
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  x-logo:
    url: https://docs.warframestat.us/wfcd_logo_color.png
    backgroundColor: transparent
    altText: Warframe Community Developers
    href: https://github.com/WFCD/
servers:
  - url: https://api.warframestat.us
    description: Production
tags:
  - name: system
    description: System health and status endpoints
  - name: worldstate
    description: Warframe worldstate data - live game events, alerts, invasions, and more
  - name: items
    description: Warframe items database - weapons, warframes, mods, and equipment
  - name: drops
    description: Drop tables and loot information
  - name: rivens
    description: Riven mod disposition and pricing statistics
  - name: wfinfo
    description: WFInfo overlay application integration endpoints
  - name: pricecheck
    description: Warframe.market price checking integration
  - name: profile
    description: Player profile parsing and statistics
  - name: social
    description: Social media feeds - Twitter and RSS
  - name: data
    description: Static Warframe data - synthesis targets, arcanes, tutorials, conclave, sol nodes, and more
paths:
  /heartbeat:
    get:
      description: Returns a simple success message to verify the API is operational
      operationId: HeartbeatController_getHeartbeat
      parameters: []
      responses:
        '200':
          description: Service is healthy and operational
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeartbeatResponseDto'
      summary: Health check endpoint
      tags:
        - system
  /weapons:
    get:
      description: Retrieve all weapons, warframes, items, or mods. Supports filtering, field selection, and localization.
      operationId: ItemsController_getAll[0]
      parameters:
        - name: Accept-Language
          in: header
          description: Preferred language for the response. First 2 characters are used (e.g., "en-US" becomes "en")
          required: false
          schema:
            type: string
            example: en
        - name: language
          required: false
          in: query
          description: 'Language code for localized data. Overrides Accept-Language header. Supported: de, es, fr, it, ko, pl, pt, ru, zh, en, uk, tr'
          schema:
            example: en
            type: string
        - name: filter
          required: false
          in: query
          description: Comma-separated list of key:value filters to apply (e.g., "tradable:true,vaulted:false")
          schema:
            example: tradable:true
            type: string
        - name: only
          required: false
          in: query
          description: Comma-separated list of fields to include in the response
          schema:
            example: name,uniqueName,type
            type: string
        - name: remove
          required: false
          in: query
          description: Comma-separated list of fields to exclude from the response
          schema:
            example: patchlogs,components
            type: string
      responses:
        '200':
          description: Array of items matching the specified type and filters. Items from @wfcd/items library include properties like name, uniqueName, type, category, tradable, and type-specific properties (e.g., damage stats for weapons, health/shield/armor for warframes, polarity/baseDrain for mods).
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    uniqueName:
                      type: string
                      example: /Lotus/Powersuits/Excalibur/Excalibur
                    name:
                      type: string
                      example: Excalibur
                    type:
                      type: string
                      example: Warframe
                    category:
                      type: string
                      example: Warframes
                    tradable:
                      type: boolean
                      example: false
                    masterable:
                      type: boolean
                      example: true
      summary: Get all items of a specific type
      tags:
        - items
