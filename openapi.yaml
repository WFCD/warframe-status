          description: Comma-separated list of fields to include in the response
          schema:
            example: name,uniqueName,type
            type: string
        - name: remove
          required: false
          in: query
          description: Comma-separated list of fields to exclude from the response
          schema:
            example: patchlogs,components
            type: string
        - name: by
          required: false
          in: query
          description: Field to search by (e.g., "name", "uniqueName", "regex"). Defaults to matching any field
          schema:
            example: name
            type: string
        - name: item
          required: true
          in: path
          description: Item identifier to search for (can be name, uniqueName, or other field specified by "by" parameter)
          schema:
            example: Excalibur
            type: string
      responses:
        '200':
          description: The requested item with full details from @wfcd/items library
          content:
            application/json:
              schema:
                type: object
                properties:
